apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Point to the base manifests
resources:
  - ../../manifests

# Set your namespace
namespace: my-openclaw

# Patch the ConfigMap with your vLLM endpoint
patches:
  - target:
      kind: ConfigMap
      name: openclaw-config
    path: configmap-patch.yaml

  - target:
      kind: PersistentVolumeClaim
      name: openclaw-state
    patch: |
      - op: replace
        path: /spec/storageClassName
        value: managed-csi
