apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  labels:
    app: openclaw
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: openclaw
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      securityContext:
        runAsNonRoot: true
      initContainers:
        - name: init-config
          # WARNING: This is an upstream community image, not built or validated by Red Hat.
          image: ghcr.io/openclaw/openclaw@sha256:037f49ba1595be9502fb345138d727cd0cfaecf1392cbe0cfe053fb4681386cd
          command:
            - sh
            - -c
            - |
              mkdir -p /home/node/.openclaw/workspace
              cp /config/openclaw.json /home/node/.openclaw/openclaw.json
              echo "Config initialized"
          volumeMounts:
            - name: config
              mountPath: /config
            - name: data
              mountPath: /home/node/.openclaw
          resources:
            limits:
              memory: 128Mi
              cpu: 100m
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      containers:
        - name: gateway
          # WARNING: This is an upstream community image, not built or validated by Red Hat.
          image: ghcr.io/openclaw/openclaw@sha256:037f49ba1595be9502fb345138d727cd0cfaecf1392cbe0cfe053fb4681386cd
          # Explicit entrypoint required — the image default doesn't start the gateway on OpenShift
          command:
            - node
            - /app/dist/index.js
            - gateway
            - run
          ports:
            - containerPort: 18789
              protocol: TCP
          env:
            - name: HOME
              value: /home/node
            - name: OPENCLAW_CONFIG_DIR
              value: /home/node/.openclaw
            - name: NODE_ENV
              value: production
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: OPENCLAW_GATEWAY_TOKEN
            - name: VLLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: VLLM_API_KEY
          volumeMounts:
            - name: data
              mountPath: /home/node/.openclaw
          resources:
            requests:
              memory: 256Mi
              cpu: 250m
            limits:
              memory: 1Gi
              cpu: "1"
          livenessProbe:
            httpGet:
              path: /
              port: 18789
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 18789
            initialDelaySeconds: 10
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: config
          configMap:
            name: openclaw-config
        - name: data
          persistentVolumeClaim:
            claimName: openclaw-state
