apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../manifests
  - codex-secret.yaml

namespace: my-openclaw

patches:
  - target:
      kind: ConfigMap
      name: openclaw-config
    path: configmap-patch.yaml

  - target:
      kind: Deployment
      name: openclaw
    path: deployment-patch.yaml
