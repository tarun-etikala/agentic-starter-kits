apiVersion: v1
kind: Secret
metadata:
  name: codex-secrets
  labels:
    app: openclaw
type: Opaque
stringData:
  # OpenAI API key for Codex app-server authentication
  OPENAI_API_KEY: "CHANGE-ME"
  # Token for WebSocket auth between gateway and Codex app-server sidecar
  CODEX_APP_SERVER_TOKEN: "CHANGE-ME"
