apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  labels:
    app: openclaw
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: openclaw
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      initContainers:
        - name: init-config
          image: ghcr.io/openclaw/openclaw:latest
          command:
            - sh
            - -c
            - |
              cp /config/openclaw.json /data/.openclaw/openclaw.json
              chgrp -R 0 /data/.openclaw
              chmod -R g=u /data/.openclaw
              echo "Config initialized"
          volumeMounts:
            - name: config
              mountPath: /config
            - name: data
              mountPath: /data/.openclaw
          resources:
            limits:
              memory: 128Mi
              cpu: 100m
      containers:
        - name: gateway
          image: ghcr.io/openclaw/openclaw:latest
          ports:
            - containerPort: 18789
              protocol: TCP
          env:
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: OPENCLAW_GATEWAY_TOKEN
            - name: OPENCLAW_HOME
              value: /data/.openclaw
          volumeMounts:
            - name: data
              mountPath: /data/.openclaw
          resources:
            requests:
              memory: 256Mi
              cpu: 250m
            limits:
              memory: 1Gi
              cpu: "1"
          livenessProbe:
            httpGet:
              path: /
              port: 18789
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 18789
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: openclaw-config
        - name: data
          persistentVolumeClaim:
            claimName: openclaw-state
