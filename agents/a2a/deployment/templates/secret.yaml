{{- if or .Values.secrets.apiKey .Values.secrets.mlflowTrackingToken }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "a2a.secretName" . }}
  labels:
    {{- include "a2a.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.secrets.apiKey }}
  api-key: {{ .Values.secrets.apiKey | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.mlflowTrackingToken }}
  mlflow-tracking-token: {{ .Values.secrets.mlflowTrackingToken | b64enc | quote }}
  {{- end }}
{{- end }}
