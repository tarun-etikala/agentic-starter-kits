---
apiVersion: v1
kind: Service
metadata:
  name: opencode-web
  annotations:
    service.beta.openshift.io/serving-cert-secret-name: opencode-web-tls
spec:
  ports:
    - name: oauth-proxy
      port: 8443
      targetPort: 8443
      protocol: TCP
  selector:
    app.kubernetes.io/name: opencode
  type: ClusterIP
