name: langgraph-react-db-memory
displayName: "LangGraph ReAct Agent with Database Memory"
framework: langgraph
description: "ReAct agent with PostgreSQL-backed conversation memory for persistent, thread-based chat history."
env:
  required:
    - API_KEY
    - BASE_URL
    - MODEL_ID
    - POSTGRES_HOST
    - POSTGRES_PORT
    - POSTGRES_DB
    - POSTGRES_USER
    - POSTGRES_PASSWORD
  optional:
    - PORT
    - CONTAINER_IMAGE
    - MLFLOW_TRACKING_URI
    - MLFLOW_EXPERIMENT_NAME
    - MLFLOW_HEALTH_CHECK_TIMEOUT
    - MLFLOW_TRACKING_TOKEN
    - MLFLOW_WORKSPACE
