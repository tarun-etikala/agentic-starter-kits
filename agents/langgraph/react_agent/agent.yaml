name: langgraph-react-agent
displayName: LangGraph ReAct Agent
description: >
  General-purpose agent using a ReAct loop: it reasons and calls tools
  (e.g. search, math) step by step. Built with LangGraph and LangChain.
framework: langgraph
tier: base
version: "0.1.0"

env:
  required:
    - API_KEY
    - BASE_URL
    - MODEL_ID
  optional: []

resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"
