name: langgraph-react-agent
displayName: "LangGraph ReAct Agent"
framework: langgraph
description: "General-purpose ReAct agent built with LangGraph using a reason-and-act loop with external tools."
env:
  required:
    - API_KEY
    - BASE_URL
    - MODEL_ID
  optional:
    - PORT
    - CONTAINER_IMAGE
    - AUTH_ENABLED
    - AUTH_AUDIENCE
    - AUTH_ALLOWED_SERVICEACCOUNTS
