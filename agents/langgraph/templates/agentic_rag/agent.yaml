name: langgraph-agentic-rag
displayName: "LangGraph Agentic RAG Agent"
framework: langgraph
description: "RAG agent that indexes documents in a vector store (Milvus) and retrieves relevant chunks to augment the LLM's answers."
labels: ["rag", "tool-calling", "vector-store"]
logo: "data:image/svg+xml;base64,"
env:
  required:
    - API_KEY
    - BASE_URL
    - MODEL_ID
  optional:
    - PORT
    - CONTAINER_IMAGE
    - EMBEDDING_MODEL
    - EMBEDDING_DIMENSION
    - VECTOR_STORE_ID
    - VECTOR_STORE_PROVIDER
    - VECTOR_STORE_PATH
    - DOCS_TO_LOAD
