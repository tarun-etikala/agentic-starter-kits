name: langgraph-agentic-rag
displayName: "LangGraph Agentic RAG"
framework: langgraph
description: "RAG agent that indexes documents in a vector store (Milvus) and retrieves relevant chunks to augment answers."
env:
  required:
    - API_KEY
    - BASE_URL
    - MODEL_ID
    - EMBEDDING_MODEL
    - VECTOR_STORE_ID
  optional:
    - PORT
    - CONTAINER_IMAGE
    - VECTOR_STORE_PATH
