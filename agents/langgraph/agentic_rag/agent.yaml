name: langgraph-agentic-rag
displayName: LangGraph Agentic RAG
description: >
  RAG agent that indexes documents in a vector store (Milvus) and retrieves
  relevant chunks to augment the LLM's answers with your own data.
framework: langgraph
tier: community
version: "0.2.0"

env:
  required:
    - API_KEY
    - BASE_URL
    - MODEL_ID
  optional:
    - EMBEDDING_MODEL
    - VECTOR_STORE_NAME
    - VECTOR_STORE_ID
    - VECTOR_STORE_PATH

resources:
  requests:
    memory: "512Mi"
    cpu: "200m"
  limits:
    memory: "1Gi"
    cpu: "1000m"
