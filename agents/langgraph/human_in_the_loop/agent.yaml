name: langgraph-human-in-the-loop
displayName: "LangGraph Human-in-the-Loop Agent"
framework: langgraph
description: "LangGraph agent with Human-in-the-Loop (HITL) approval for sensitive tool calls."
env:
  required:
    - API_KEY
    - BASE_URL
    - MODEL_ID
  optional:
    - PORT
    - CONTAINER_IMAGE
    - MLFLOW_TRACKING_URI
    - MLFLOW_EXPERIMENT_NAME
    - MLFLOW_HEALTH_CHECK_TIMEOUT
    - MLFLOW_TRACKING_TOKEN
    - MLFLOW_WORKSPACE
