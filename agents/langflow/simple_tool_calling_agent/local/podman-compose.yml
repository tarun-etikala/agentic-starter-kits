version: "3.8"

services:
  # ── Langflow (UI + Server) ─────────────────────────────────────────
  langflow:
    image: docker.io/langflowai/langflow:1.7.1
    ports:
      - "7860:7860"
    environment:
      LANGFLOW_DATABASE_URL: "postgresql://${POSTGRES_USER:-langflow}:${POSTGRES_PASSWORD:-langflow}@postgres:5432/${POSTGRES_DB:-langflow}"
      LANGFLOW_CONFIG_DIR: /var/lib/langflow
      LANGFLOW_SKIP_AUTH_AUTO_LOGIN: "true"
      # Model endpoint — points to Ollama running on the host machine (not in a container)
      OPENAI_API_BASE: "http://host.containers.internal:11434/v1"
      OPENAI_API_KEY: "not-needed-for-local-development"
      OLLAMA_BASE_URL: "http://host.containers.internal:11434"
      # Langfuse tracing
      LANGFUSE_HOST: "http://langfuse-web:3000"
      LANGFUSE_PUBLIC_KEY: "pk-lf-local-dev"
      LANGFUSE_SECRET_KEY: "sk-lf-local-dev"
    volumes:
      - langflow_data:/var/lib/langflow:Z
    depends_on:
      postgres:
        condition: service_healthy
      langfuse-web:
        condition: service_started

  # ── PostgreSQL (shared by Langflow and Langfuse) ────────────────────
  postgres:
    image: docker.io/library/postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-langflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-langflow}
      POSTGRES_DB: ${POSTGRES_DB:-langflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data:Z
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:Z
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-langflow}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Langfuse v3 (Tracing) ────────────────────────────────────────

  langfuse-web:
    image: docker.io/langfuse/langfuse:3.162.0
    restart: always
    ports:
      - "127.0.0.1:3000:3000"
    depends_on: &langfuse-depends-on
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment: &langfuse-env
      DATABASE_URL: "postgresql://${POSTGRES_USER:-langflow}:${POSTGRES_PASSWORD:-langflow}@postgres:5432/langfuse"
      NEXTAUTH_URL: "http://localhost:3000"
      NEXTAUTH_SECRET: "local-dev-secret"
      SALT: "local-dev-salt"
      ENCRYPTION_KEY: "${LANGFUSE_ENCRYPTION_KEY}"
      TELEMETRY_ENABLED: "false"
      # ClickHouse
      CLICKHOUSE_MIGRATION_URL: "clickhouse://clickhouse:9000"
      CLICKHOUSE_URL: "http://clickhouse:8123"
      CLICKHOUSE_USER: "clickhouse"
      CLICKHOUSE_PASSWORD: "clickhouse"
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      # Redis
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      REDIS_AUTH: "localredis"
      # MinIO (S3-compatible object storage)
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: "langfuse"
      LANGFUSE_S3_EVENT_UPLOAD_REGION: "auto"
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: "minio"
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: "miniosecret"
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: "http://minio:9000"
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_EVENT_UPLOAD_PREFIX: "events/"
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: "langfuse"
      LANGFUSE_S3_MEDIA_UPLOAD_REGION: "auto"
      LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: "minio"
      LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: "miniosecret"
      LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: "http://minio:9000"
      LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_MEDIA_UPLOAD_PREFIX: "media/"
      # Headless init — auto-creates org, project, user, and API keys
      LANGFUSE_INIT_ORG_ID: "langflow-org"
      LANGFUSE_INIT_ORG_NAME: "Langflow Agent"
      LANGFUSE_INIT_PROJECT_ID: "langflow-project"
      LANGFUSE_INIT_PROJECT_NAME: "Langflow Agent"
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: "pk-lf-local-dev"
      LANGFUSE_INIT_PROJECT_SECRET_KEY: "sk-lf-local-dev"
      LANGFUSE_INIT_USER_EMAIL: "admin@langflow.local"
      LANGFUSE_INIT_USER_NAME: "admin"
      LANGFUSE_INIT_USER_PASSWORD: "${LANGFUSE_ADMIN_PASSWORD}"

  langfuse-worker:
    image: docker.io/langfuse/langfuse-worker:3.162.0
    restart: always
    depends_on: *langfuse-depends-on
    environment:
      <<: *langfuse-env

  # ── ClickHouse (Langfuse analytics DB) ──────────────────────────────
  clickhouse:
    image: docker.io/clickhouse/clickhouse-server:26.2
    restart: always
    user: "101:101"
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse
    volumes:
      - clickhouse_data:/var/lib/clickhouse:Z
      - clickhouse_logs:/var/log/clickhouse-server:Z
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── MinIO (Langfuse S3-compatible object storage) ───────────────────
  minio:
    # MinIO uses date-based release tags instead of semver
    image: docker.io/minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: always
    entrypoint: sh
    command: -c 'mkdir -p /data/langfuse && minio server --address ":9000" --console-address ":9001" /data'
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: miniosecret
    volumes:
      - minio_data:/data:Z
    healthcheck:
      test: [ "CMD", "mc", "ready", "local" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Redis (Langfuse caching + job queue) ────────────────────────────
  redis:
    image: docker.io/redis:7.4.8
    restart: always
    command: >
      --requirepass localredis
      --maxmemory-policy noeviction
    volumes:
      - redis_data:/data:Z
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "localredis", "ping" ]
      interval: 3s
      timeout: 10s
      retries: 10

volumes:
  langflow_data:
  postgres_data:
  clickhouse_data:
  clickhouse_logs:
  minio_data:
  redis_data:
