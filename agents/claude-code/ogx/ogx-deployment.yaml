# OGX Deployment for Claude Code Passthrough
#
# Deploys OGX as a standalone pod that provides the Anthropic Messages API
# (/v1/messages) passthrough to a vLLM backend. When vLLM supports
# /v1/messages natively, OGX forwards requests directly without translation.
#
# This deployment does not use the OGX Kubernetes operator. The configuration
# is loaded from a ConfigMap mounted at /etc/ogx/config.yaml.
#
# Before applying, ensure the ogx-configmap.yaml has been applied first.
# Update the image reference if your RHOAI release ships a different OGX build.
#
# Usage:
#   oc apply -f ogx-deployment.yaml -n <NAMESPACE>
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ogx
  labels:
    app: ogx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ogx
  template:
    metadata:
      labels:
        app: ogx
    spec:
      securityContext:
        fsGroup: 1001
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: ogx
        command:
        - /bin/sh
        - -c
        - |
          set -e

          VERSION_CODE=$(python -c "
          import sys
          from importlib.metadata import version
          from packaging import version as pkg_version

          try:
              ogx_version = version('ogx')
              print(f'Detected ogx version: {ogx_version}', file=sys.stderr)

              v = pkg_version.parse(ogx_version)
              base_v = pkg_version.parse(v.base_version)

              if base_v < pkg_version.parse('0.2.17'):
                  print(0)
              elif base_v < pkg_version.parse('0.3.0'):
                  print(1)
              else:
                  print(2)
          except Exception as e:
              print(f'Version detection failed, defaulting to new CLI: {e}', file=sys.stderr)
              print(2)
          ")

          PORT=${OGX_PORT:-8321}
          WORKERS=${OGX_WORKERS:-1}

          case "$VERSION_CODE" in
              0) exec python3 -m ogx.distribution.server.server --config /etc/ogx/config.yaml ;;
              1) exec python3 -m ogx.core.server.server /etc/ogx/config.yaml ;;
              2) exec uvicorn ogx.core.server.server:create_app --host 0.0.0.0 --port "$PORT" --workers "$WORKERS" --factory ;;
              *) echo "Invalid version code: $VERSION_CODE"; exit 1 ;;
          esac
        image: registry.redhat.io/rhoai/odh-ogx-core-rhel9@sha256:8cca913e20b0f22de690ad0975365d933beccadf5110b698832fad3c5124518b
        env:
        - name: HF_HOME
          value: /.ogx
        - name: OGX_WORKERS
          value: "1"
        - name: OGX_PORT
          value: "8321"
        - name: OGX_CONFIG
          value: /etc/ogx/config.yaml
        ports:
        - containerPort: 8321
          name: http
          protocol: TCP
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: "1"
            memory: 1Gi
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          capabilities:
            drop:
              - ALL
          seccompProfile:
            type: RuntimeDefault
        readinessProbe:
          httpGet:
            path: /v1/health
            port: 8321
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
        livenessProbe:
          httpGet:
            path: /v1/health
            port: 8321
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        volumeMounts:
        - name: config
          mountPath: /etc/ogx
          readOnly: true
        - name: ogx-storage
          mountPath: /.ogx
      volumes:
      - name: config
        configMap:
          name: ogx-config
      - name: ogx-storage
        emptyDir: {}
