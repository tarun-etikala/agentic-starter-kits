# Claude Code Deployment for OpenShift - vLLM Direct Connection
#
# This deployment connects Claude Code directly to a vLLM server that supports
# the Anthropic Messages API (/v1/messages endpoint).
#
# Directory Structure:
#   /workspace/                - PVC mount (persistent)
#   /workspace/.claude/        - Global config (CLAUDE_CONFIG_DIR) - settings, skills, memory
#   /workspace/projects/       - Working directory (WORKDIR) - where users run Claude
#   /workspace/projects/.claude/ - Local auto-memory (separate from global config)
#
# Prerequisites:
# 1. A vLLM server with /v1/messages endpoint support
# 2. The vLLM model must have a context window >= 32K tokens
#    (Claude Code's system prompt is ~23K tokens)
#
# Before applying this manifest:
# 1. Update the ANTHROPIC_BASE_URL to point to your vLLM server
# 2. Update the model ID in the claude-vllm-settings ConfigMap
# 3. Update the ANTHROPIC_CUSTOM_MODEL_OPTION env var

---
# ImageStream to hold the built image
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: claude-code
  labels:
    app: claude-code-vllm
spec:
  lookupPolicy:
    local: true

---
# BuildConfig to build from Containerfile
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: claude-code
  labels:
    app: claude-code-vllm
spec:
  source:
    type: Binary
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Containerfile
  output:
    to:
      kind: ImageStreamTag
      name: claude-code:latest
  triggers: []

---
# ConfigMap for Claude Code settings (sets default model)
# IMPORTANT: The model ID here should be the bare model name (no provider prefix)
apiVersion: v1
kind: ConfigMap
metadata:
  name: claude-vllm-settings
  labels:
    app: claude-code-vllm
data:
  settings.json: |
    {
      "model": "YOUR_MODEL_ID"
    }

---
# ConfigMap for optional MCP configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: claude-vllm-mcp-config
  labels:
    app: claude-code-vllm
data:
  config.json: |
    {
      "mcpServers": {}
    }

---
# ConfigMap for skills (empty by default)
apiVersion: v1
kind: ConfigMap
metadata:
  name: claude-vllm-skills
  labels:
    app: claude-code-vllm
data: {}

---
# PVC for workspace persistence (optional)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: claude-vllm-workspace
  labels:
    app: claude-code-vllm
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: claude-code-vllm
  labels:
    app: claude-code-vllm
spec:
  replicas: 1
  # Recreate strategy required for ReadWriteOnce PVC
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: claude-code-vllm
  template:
    metadata:
      labels:
        app: claude-code-vllm
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: claude-code
          image: claude-code:latest
          imagePullPolicy: Always
          command: ["entrypoint.sh"]
          args: ["sleep", "infinity"]  # Keep container running for exec access
          env:
            # ===========================================
            # Runtime Environment
            # ===========================================
            - name: HOME
              value: "/home/claude-agent"
            # CLAUDE_CONFIG_DIR enables session persistence across pod restarts
            # The entrypoint creates a symlink: ~/.claude -> /workspace/.claude
            - name: CLAUDE_CONFIG_DIR
              value: "/workspace/.claude"
            # ===========================================
            # vLLM Connection
            # ===========================================
            # vLLM server URL - UPDATE THIS
            # For internal service: http://vllm-service.namespace.svc.cluster.local
            # For external route: https://vllm-route.apps.cluster.domain
            - name: ANTHROPIC_BASE_URL
              value: YOUR_VLLM_URL
            # vLLM doesn't validate API keys, but Claude Code requires one
            - name: ANTHROPIC_API_KEY
              value: "fake"
            # Adds model to the Claude Code model picker menu
            # Use bare model ID (no provider prefix) for direct vLLM connection
            - name: ANTHROPIC_CUSTOM_MODEL_OPTION
              value: "YOUR_MODEL_ID"
            # ===========================================
            # Model Alias Overrides (Required)
            # ===========================================
            # Claude Code uses internal model aliases (haiku, sonnet, opus)
            # for certain operations. Override them to prevent 404 errors.
            - name: ANTHROPIC_DEFAULT_HAIKU_MODEL
              value: "YOUR_MODEL_ID"
            - name: ANTHROPIC_DEFAULT_SONNET_MODEL
              value: "YOUR_MODEL_ID"
            - name: ANTHROPIC_DEFAULT_OPUS_MODEL
              value: "YOUR_MODEL_ID"
            # ===========================================
            # Claude Code Configuration
            # ===========================================
            - name: MCP_CONFIG_FILE
              value: "/etc/mcp/config.json"
            # WARNING: Setting SKIP_PERMISSIONS=true disables all Claude permission checks.
            # This bypasses file-system write confirmations. Only use in fully sandboxed
            # environments where the container has no access to sensitive host resources.
            - name: SKIP_PERMISSIONS
              value: "true"
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            # Skills and settings are mounted inside /workspace/.claude/ (the CLAUDE_CONFIG_DIR)
            # This enables session persistence while keeping ConfigMap-based injection
            - name: skills
              mountPath: /workspace/.claude/skills
              readOnly: true
            - name: mcp-config
              mountPath: /etc/mcp
              readOnly: true
            # Mount settings.json to set default model
            - name: claude-settings
              mountPath: /workspace/.claude/settings.json
              subPath: settings.json
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "1"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: claude-vllm-workspace
        - name: skills
          configMap:
            name: claude-vllm-skills
            optional: true
        - name: mcp-config
          configMap:
            name: claude-vllm-mcp-config
            optional: true
        - name: claude-settings
          configMap:
            name: claude-vllm-settings
            optional: true
