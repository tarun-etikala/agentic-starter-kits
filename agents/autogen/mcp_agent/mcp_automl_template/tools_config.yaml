# MCP tools defined by JSON schema. Each tool gets a name, description, and input schema path.
# Optional: deployment_url_env and deployment_token_env to call an HTTP deployment with the input.

tools:
  - name: invoke_churn
    description: Invoke deployment for Telco customer churn prediction. Provide input fields matching the churn schema (e.g. gender, tenure, Contract, MonthlyCharges). Use when the user asks about churn likelihood or whether a customer will churn.
    schema_path: churn_schema.json
    deployment_url_env: DEPLOYMENT_URL
    deployment_token_env: DEPLOYMENT_TOKEN
