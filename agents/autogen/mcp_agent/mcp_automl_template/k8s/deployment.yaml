# Deployment for MCP AutoML Server (OpenShift)
#
# 1. Create secret for deployment token:
#    oc create secret generic mcp-automl-secrets \
#      --from-literal=deployment-token='YOUR_DEPLOYMENT_TOKEN'
#
# 2. Set env and deploy:
#    export CONTAINER_IMAGE_MCP=<your-registry>/mcp-automl:latest
#    export DEPLOYMENT_URL=https://your-model.../v1/models/your-model:predict
#    envsubst < k8s/deployment.yaml | oc apply -f -
#
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-automl
  labels:
    app: mcp-automl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-automl
  template:
    metadata:
      labels:
        app: mcp-automl
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
      - name: mcp-automl
        image: "${CONTAINER_IMAGE_MCP}"
        ports:
        - containerPort: 8080
          name: http
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
        env:
        - name: PORT
          value: "8080"
        # Trust OpenShift Route (reverse proxy); avoids 421 Invalid Host header
        - name: UVICORN_FORWARDED_ALLOW_IPS
          value: "*"
        - name: DEPLOYMENT_URL
          value: "${DEPLOYMENT_URL}"
        - name: DEPLOYMENT_TOKEN
          valueFrom:
            secretKeyRef:
              name: mcp-automl-secrets
              key: deployment-token
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 120
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 30
          timeoutSeconds: 3
          failureThreshold: 3
