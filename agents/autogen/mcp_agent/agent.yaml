name: autogen-mcp-agent
displayName: "AutoGen MCP Agent"
framework: autogen
description: "AutoGen agent with MCP tools over SSE, exposing an OpenAI-compatible chat API."
env:
  required:
    - API_KEY
    - BASE_URL
    - MODEL_ID
    - MCP_SERVER_URL
  optional:
    - PORT
    - CONTAINER_IMAGE
    - MLFLOW_TRACKING_URI
    - MLFLOW_EXPERIMENT_NAME
    - MLFLOW_HEALTH_CHECK_TIMEOUT
    - MLFLOW_TRACKING_TOKEN
    - MLFLOW_WORKSPACE
    - LLM_PROVIDER
