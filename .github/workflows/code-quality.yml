name: Code Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions: {}

concurrency:
  group: code-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff==0.15.11

      - name: Ruff lint
        run: ruff check . --output-format=github

      - name: Ruff format check
        run: ruff format --check .

      - name: Markdownlint
        # v23.0.0 bundles markdownlint-cli2 0.22.1 — keep in sync with .pre-commit-config.yaml
        uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd  # v23.2.0
        with:
          globs: "**/*.md"

      - name: Actionlint
        # shellcheck is pre-installed on ubuntu-latest, so run: steps are also linted
        uses: raven-actions/actionlint@205b530c5d9fa8f44ae9ed59f341a0db994aa6f8  # v2.1.2
        with:
          version: 1.7.12

  lockfile-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          version: "0.11.21"  # Keep in sync with uv-pre-commit rev in .pre-commit-config.yaml

      - name: Verify lock files are up to date
        run: |
          failed=0
          while IFS= read -r pyproject; do
            dir="$(dirname "$pyproject")"
            echo "Checking $dir..."
            if [ ! -f "$dir/uv.lock" ]; then
              echo "::error file=$pyproject::Missing uv.lock — run 'uv lock' in $dir"
              failed=1
              continue
            fi
            if ! (cd "$dir" && uv lock --check); then
              echo "::error file=$dir/uv.lock::Lock file is stale — run 'uv lock' in $dir"
              failed=1
            fi
          done < <(find . -name pyproject.toml ! -path '*/.venv/*' ! -path '*/egg-info/*')
          exit $failed

  secret-scanning:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0

      - name: Gitleaks
        env:
          GITLEAKS_VERSION: "8.30.1"
          GITLEAKS_SHA256: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
        run: |
          curl -sSfL -o gitleaks.tar.gz "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_SHA256}  gitleaks.tar.gz" | sha256sum -c -
          tar -xzf gitleaks.tar.gz gitleaks
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            ./gitleaks detect --source . --config .gitleaks.toml --log-opts="origin/main..HEAD" --verbose --redact
          else
            ./gitleaks detect --source . --config .gitleaks.toml --verbose --redact
          fi

  type-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ty
        run: pip install ty==0.0.51

      - name: Run type-check
        # ty (Astral) — same toolchain as ruff/uv.
        # --ignore rules suppress noise from third-party deps not installed
        # in this job and framework-specific dynamic patterns (decorators,
        # monkey-patching, global None|Callable singletons).
        run: >
          ty check
          --ignore unresolved-import
          --ignore unresolved-attribute
          --ignore call-non-callable
          --ignore invalid-argument-type
          --ignore unsupported-operator
          --ignore invalid-assignment
          --ignore invalid-type-form
          --ignore invalid-yield
          agents/ components/
