{{- if or .Values.secrets.apiKey .Values.secrets.postgresPassword .Values.secrets.mlflowTrackingToken }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agent.fullname" . }}-secret
  labels:
    {{- include "agent.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.secrets.apiKey }}
  api-key: {{ .Values.secrets.apiKey | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.postgresPassword }}
  postgres-password: {{ .Values.secrets.postgresPassword | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.mlflowTrackingToken }}
  mlflow-tracking-token: {{ .Values.secrets.mlflowTrackingToken | b64enc | quote }}
  {{- end }}
{{- end }}
