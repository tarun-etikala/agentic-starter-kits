{{- if .Values.deploymentsEnabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: a2a-langgraph-agent
  labels:
    app: a2a-langgraph-agent
    {{- include "a2a.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: a2a-langgraph-agent
  template:
    metadata:
      labels:
        app: a2a-langgraph-agent
    spec:
      containers:
        - name: a2a-langgraph-agent
          image: "{{ .Values.image.langgraph.repository }}:{{ .Values.image.langgraph.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
              name: http
              protocol: TCP
          env:
            - name: A2A_ROLE
              value: "langgraph"
            - name: PORT
              value: {{ .Values.service.port | quote }}
            - name: LANGGRAPH_A2A_PUBLIC_URL
              value: {{ .Values.langgraphPublicUrl | quote }}
            - name: CREW_A2A_URL
              value: "http://a2a-crew-agent:8080"
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: a2a-langgraph-crewai-secrets
                  key: api-key
            - name: BASE_URL
              value: {{ .Values.env.BASE_URL | quote }}
            - name: MODEL_ID
              value: {{ .Values.env.MODEL_ID | quote }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /.well-known/agent-card.json
              port: {{ .Values.service.port }}
              scheme: HTTP
            initialDelaySeconds: {{ .Values.probes.langgraph.livenessInitialDelay }}
            periodSeconds: {{ .Values.probes.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.failureThreshold }}
          readinessProbe:
            httpGet:
              path: /.well-known/agent-card.json
              port: {{ .Values.service.port }}
              scheme: HTTP
            initialDelaySeconds: {{ .Values.probes.langgraph.readinessInitialDelay }}
            periodSeconds: {{ .Values.probes.readinessPeriodSeconds }}
            timeoutSeconds: {{ .Values.probes.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readinessFailureThreshold }}
{{- end }}
